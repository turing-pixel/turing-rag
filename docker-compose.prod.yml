# Production: backend + frontend only (this file never builds MinIO or Ollama).
# Typical VPS layout:
#   - Ollama: on the host -> backend uses OLLAMA_API_BASE=http://host.docker.internal:11434
#   - MinIO: separate Docker container with -p 9000:9000 on host -> MINIO_ENDPOINT=host.docker.internal:9000
#   - PostgreSQL: on the host -> POSTGRES_SERVER=host.docker.internal
#   - Chroma: separate container (docker-compose.chroma.yml), data in ./chroma_data
#     -> CHROMA_URL=http://host.docker.internal:28100
services:
  backend:
    build: ./apps/api
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        API_BASE_URL: ${API_BASE_URL:-}
        WEB_BASE_URL: ${WEB_BASE_URL:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
