# Production: backend + frontend only.
# PostgreSQL, MinIO, and Ollama run on the host; Chroma uses persistent mode on a mounted volume.
services:
  backend:
    build: ./backend
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_data:/data/chroma
    ports:
      - "${BACKEND_PORT:-8765}:8000"
    restart: unless-stopped
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8765}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
